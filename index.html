<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Page</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
        rel="stylesheet"  
        href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Inter:wght@300;400;600&family=M+PLUS+1p:wght@300;400;600&display=swap"
    />

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/theme.css" />
  </head>

  <body>
    <div id="wallpaper" class="layer wallpaper"></div>
    <div id="wallpaper-fx" class="layer wallpaper-fx"></div>
    <div id="decor-layer" class="layer decor-layer"></div>

    <main id="stage" class="stage">
      <section
        class="panel"
        data-panel="clock"
        data-x="80"
        data-y="70"
        data-width="560"
        data-height="200"
      >
        <header class="panel-header">
          <span class="panel-title">clock</span>
          <span class="panel-handle">⋮⋮</span>
        </header>

        <div class="panel-body">
          <div class="clock-time" id="clock-time">--:--:--</div>

          <div class="clock-date" id="clock-date">----/--/-- (---)</div>
        </div>

        <div class="panel-resize"></div>
      </section>

      <section
        class="panel"
        data-panel="search"
        data-x="80"
        data-y="300"
        data-width="760"
        data-height="170"
      >
        <header class="panel-header">
          <span class="panel-title">search</span>
          <span class="panel-handle">⋮⋮</span>
        </header>

        <div class="panel-body">
          <form id="search-form" class="search-form">
            <input
              id="search-input"
              class="search-input"
              type="text"
              placeholder="Google search / URL"
            />

            <button class="search-button" type="submit">↵</button>
          </form>

          <ul id="search-suggest" class="search-suggest"></ul>
        </div>

        <div class="panel-resize"></div>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
